<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting | ConnectX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=2) }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --meeting-bg: #111111;
            --control-bg: rgba(30, 30, 30, 0.85);
            --danger: #ff4444;
            --primary: #2383e2;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--meeting-bg);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Lobby / Preview */
        #join-screen {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            z-index: 100; background: var(--meeting-bg);
            transition: opacity 0.4s ease;
        }
        #join-screen.hidden { opacity: 0; pointer-events: none; }

        .lobby-card {
            background: rgba(40, 40, 40, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 24px;
            width: 90%; max-width: 480px; text-align: center;
        }

        .preview-box {
            position: relative; width: 100%; aspect-ratio: 16/9;
            background: #000; border-radius: 12px; margin: 24px 0;
            overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #previewVideo { width: 100%; height: 100%; object-fit: cover; }

        /* Meeting Room */
        #meeting-screen {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            visibility: hidden; opacity: 0; transition: opacity 0.6s ease;
        }
        #meeting-screen.active { visibility: visible; opacity: 1; }

        #video-grid {
            flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px; padding: 20px; align-content: center; justify-items: center;
            overflow-y: auto;
        }

        .video-wrapper {
            position: relative; width: 100%; aspect-ratio: 16/9;
            background: #1a1a1a; border-radius: 16px; border: 1px solid rgba(255,255,255,0.15);
            overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .video-wrapper.speaking { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }

        video { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

        .user-tag {
            position: absolute; bottom: 12px; left: 12px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 500;
        }

        .controls-bar {
            height: 80px; display: flex; align-items: center; justify-content: center; 
            gap: 16px; background: var(--control-bg); backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .control-btn {
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: none; color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .control-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .control-btn.active { background: white; color: black; }
        .control-btn.danger { background: var(--danger); color: white; }
        .control-btn.danger:hover { background: #ff2222; }

        .room-id-tag {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 8px 16px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px; font-weight: 600; font-family: monospace;
            display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>
    <div class="room-id-tag">
        <div style="width:10px; height:10px; border-radius:50%; background:#00ff00; box-shadow:0 0 5px #00ff00;"></div>
        ConnectX Room: {{ room_id }}
    </div>

    <!-- Lobby -->
    <div id="join-screen">
        <div class="lobby-card">
            <h2 style="margin:0;">Meeting Ready</h2>
            <p style="color:rgba(255,255,255,0.6); margin:8px 0 0 0;">Check your camera and mic before joining.</p>

            <div class="preview-box">
                <video id="previewVideo" autoplay muted playsinline></video>
                <div id="no-preview-label" style="display:none; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px;">
                    <span class="material-symbols-outlined" style="font-size:48px;">videocam_off</span>
                    <span>Camera is off</span>
                </div>
            </div>

            <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 24px;">
                <button onclick="toggleAudio()" id="previewMicBtn" class="control-btn active" title="Toggle Mic">
                    <span class="material-symbols-outlined">mic</span>
                </button>
                <button onclick="toggleVideo()" id="previewCamBtn" class="control-btn active" title="Toggle Cam">
                    <span class="material-symbols-outlined">videocam</span>
                </button>
            </div>

            <input type="hidden" id="roomInput" value="{{ room_id }}">
            <button id="joinBtn" class="btn btn-primary" style="width:100%; padding:14px; border-radius:12px; font-weight:600; background:var(--primary); border:none; color:white; cursor:pointer; font-size:16px;">
                Join Meeting
            </button>
        </div>
    </div>

    <!-- Main Room -->
    <div id="meeting-screen">
        <div id="video-grid">
            <!-- Local User -->
            <div class="video-wrapper" id="local-wrapper">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="user-tag">You (Host)</div>
            </div>
        </div>

        <div class="controls-bar">
            <button onclick="toggleAudio()" id="micBtn" class="control-btn active" title="Mute Microphone">
                <span class="material-symbols-outlined">mic</span>
            </button>
            <button onclick="toggleVideo()" id="camBtn" class="control-btn active" title="Turn off Camera">
                <span class="material-symbols-outlined">videocam</span>
            </button>
            <button id="leaveBtn" class="control-btn danger" onclick="window.location.href='/meetings'" title="Leave Meeting">
                <span class="material-symbols-outlined">call_end</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/meeting.js', v=3) }}"></script>
</body>
</html>
