{% extends "base.html" %}
{% block title %}Sign Up — ConnectX{% endblock %}

{% block content %}
<div class="auth-bg-pattern"></div>
<div class="auth-block">
    <h2 class="page-title" style="margin-bottom: 8px;">Sign up</h2>
    <p class="page-subtitle">Create a new ConnectX account</p>

    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Choose a username" autocomplete="username">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="name@gmail.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="reg-password" required placeholder="Create a password" autocomplete="new-password">
                    <button type="button" class="password-toggle" title="Show/hide password">
                        <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" name="cpassword" id="reg-cpassword" required placeholder="Confirm your password" autocomplete="new-password">
                    <button type="button" class="password-toggle" title="Show/hide password">
                        <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select name="role" required>
                    <option value="">Select a role</option>
                    <option value="team_leader">Team Lead</option>
                    <option value="team_member">Team Member</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary full-width" style="margin-top: 12px;">Create Account</button>

            {% if message %}
            <div class="message">{{ message }}</div>
            {% endif %}
        </form>

        <div style="text-align: center; margin-top: 20px; font-size: 14px;">
            Already have an account? <a href="{{ url_for('login') }}" style="color: var(--btn-bg); font-weight: 500;">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
