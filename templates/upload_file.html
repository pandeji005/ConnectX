{% extends "dashboard_base.html" %}
{% block title %}Upload File{% endblock %}
{% block content %}
<h1 class="page-title">Upload File 📎</h1>
<p class="page-subtitle">Upload assets to the ConnectX workspace.</p>

<div style="max-width: 500px; border: 1px solid var(--border-color); padding: 32px; border-radius: 8px; margin-top: 24px; text-align: center; background: var(--bg-color);">
    {% if msg %}
    <div style="margin-bottom: 20px; padding: 12px; background: rgba(88, 101, 242, 0.1); border: 1px solid #5865F2; color: #5865F2; border-radius: 6px;">{{ msg }}</div>
    {% endif %}
    
    <form method="post" action="{{ url_for('upload_file') }}" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 24px; align-items: center;">
        <div style="border: 2px dashed var(--border-color); padding: 40px; border-radius: 8px; width: 100%; box-sizing: border-box; background: var(--hover-bg);">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 12px; color: var(--text-muted);">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <br>
            <input type="file" name="file" required style="font-size: 14px; text-align: center; max-width: 100%; color: var(--text-color);">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Upload File</button>
    </form>
    
    <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-color);">
        <a href="{{ url_for('dashboard') }}" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">← Back to Dashboard</a>
    </div>
</div>
{% endblock %}
