{% extends "base.html" %}
{% block title %}Login — ConnectX{% endblock %}

{% block content %}
<div class="auth-bg-pattern"></div>
<div class="auth-block">
    <h2 class="page-title" style="margin-bottom: 8px;">Log in</h2>
    <p class="page-subtitle">Welcome back to ConnectX</p>

    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username" autocomplete="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="login-password" required placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="password-toggle" title="Show/hide password">
                        <!-- Eye open (shown when password hidden) -->
                        <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <!-- Eye closed (shown when password visible) -->
                        <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select name="role" required>
                    <option value="">Select a role</option>
                    <option value="team_leader">Team Lead</option>
                    <option value="team_member">Team Member</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary full-width" style="margin-top: 12px;">Login</button>

            {% if message %}
            <div class="message">{{ message }}</div>
            {% endif %}
        </form>

        <div style="margin: 20px 0; display: flex; align-items: center; gap: 12px;">
            <hr style="flex:1; border: 0; border-top: 1px solid var(--border-color);">
            <span style="font-size: 13px; color: var(--text-muted);">or</span>
            <hr style="flex:1; border: 0; border-top: 1px solid var(--border-color);">
        </div>

        <a href="{{ url_for('login_google') }}" class="btn-google">
            <!-- Google G SVG logo -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18">
                <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.2 29.2 35 24 35c-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.3 1 7.2 2.8l5.7-5.7C33.5 7.3 29 5 24 5 12.9 5 4 13.9 4 25s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16.1 18.9 13 24 13c2.8 0 5.3 1 7.2 2.8l5.7-5.7C33.5 7.3 29 5 24 5c-7.7 0-14.4 4.4-17.7 9.7z"/>
                <path fill="#4CAF50" d="M24 45c4.9 0 9.4-1.9 12.7-4.9l-6.1-5.2C29.1 36.5 26.7 37 24 37c-5.1 0-9.5-2.7-11.3-6.8l-6.6 5.1C9.5 40.5 16.2 45 24 45z"/>
                <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.4 4.2-4.4 5.5l6.1 5.2C43 34.8 44 30.2 44 25c0-1.3-.1-2.6-.4-3.9z"/>
            </svg>
            Continue with Google
        </a>

        <div style="text-align: center; margin-top: 20px; font-size: 14px;">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--btn-bg); font-weight: 500;">Sign up</a>
        </div>
    </div>
</div>
{% endblock %}
