<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=5) }}">
    <!-- Anti-flicker: apply theme BEFORE render -->
    <script>
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            if (t === 'dark') {
                document.documentElement.classList.add('dark-mode');
                document.documentElement.classList.add('dark-mode-pending');
            }
        })();
    </script>
</head>
<body>
    <!-- Anti-flicker: apply to body immediately -->
    <script>
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            if (t === 'dark') document.body.classList.add('dark-mode');
        })();
    </script>

    <div class="top-nav" style="left: 40px; right: 40px; justify-content: space-between;">
        <a href="{{ url_for('home') }}" class="logo-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
                <path d="M3 12 V 7 L 12 2 L 21 7 V 12" stroke="#00e5ff" />
                <path d="M21 12 V 17 L 12 22 L 3 17 V 12" stroke="#5c6bf2" />
            </svg>
            <span style="font-size: 18px; font-weight: 600;">ConnectX</span>
        </a>
        <div style="display: flex; gap: 12px; align-items: center;">
            <button class="theme-toggle" title="Toggle Theme" aria-label="Toggle Theme">
                <!-- Moon icon (shown in light mode) -->
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <!-- Sun icon (shown in dark mode) -->
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
            {% block nav_buttons %}
            <a href="/" class="btn btn-outline" style="padding: 4px 10px; font-size:13px;">Home</a>
            {% endblock %}
        </div>
    </div>

    <div class="{% block container_class %}page-container{% endblock %}">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='js/script.js', v=5) }}"></script>
</body>
</html>
